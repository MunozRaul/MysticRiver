on:
  workflow_call:
    inputs:
      dotnet-version:
        required: true
        type: string

jobs:
  dotnet:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      # temporary to check if we can actually read the labels
      - name: Check version computation
        env:
          CONTAINS_MAJOR: ${{ contains(github.event.pull_request.labels.*.name, 'major') }}
          CONTAINS_MINOR: ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}
          CONTAINS_PATCH: ${{ contains(github.event.pull_request.labels.*.name, 'patch') }}
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.0)
          IFS='.' read -r MA MI PA <<< "$TAG"
          echo "Current tag: $TAG"

          if [[ ${{ env.CONTAINS_MAJOR }} == "true" ]]; then
            MA=$((MA+1)); MI=0; PA=0
          elif [[ ${{ env.CONTAINS_MINOR }} == "true" ]]; then
            MI=$((MI+1)); PA=0
          elif [[ ${{ env.CONTAINS_PATCH }} == "true" ]]; then
            PA=$((PA+1))
          else
            echo "no new version, exiting..."
            exit 0
          fi

          NEW_TAG="v$MA.$MI.$PA"
          echo "version=$NEW_TAG"
      
      - name: .NET Restore
        run: dotnet restore src/MysticRiver.HttpApi/MysticRiver.HttpApi.csproj

      - name: .NET Build
        run: dotnet build src/MysticRiver.HttpApi/MysticRiver.HttpApi.csproj --configuration Release

      - name: .NET Tests
        run: |
          failed=0
          for proj in $(find test -name "*.csproj"); do
            echo "Running tests in $proj"
            dotnet test "$proj" \
              --logger "trx;LogFileName=$(basename $proj .csproj).trx" \
              --results-directory TestResults \
              --blame-hang-timeout 5m \
              --blame-crash || failed=1
          done
          exit $failed

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          retention-days: 7
          path: |
            TestResults/**/*.trx
            TestResults/**/Sequence.xml

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -d "TestResults" ]; then
            echo "Artifacts uploaded (TRX + blame data)." >> $GITHUB_STEP_SUMMARY
          else
            echo "No test results found." >> $GITHUB_STEP_SUMMARY
          fi
