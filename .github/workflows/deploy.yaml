name: Build and Deploy

on:
  push:
    branches: [main, staging]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/munozraul/mysticriver/mysticriver-api

jobs:
  dotnet:
    uses: ./.github/workflows/reusable-dotnet.yaml
    with:
      dotnet-version: 10.0

  version:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'staging'
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: version computation
        id: bump
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        run: |
          git fetch --tags
          TAG=$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || echo 0.0.0)
          VERSION="$TAG"

          IFS='.' read -r MA MI PA <<< "$VERSION"
          LABELS_LOWER=$(echo "$LABELS" | tr '[:upper:]' '[:lower:]')

          if [[ "$LABELS_LOWER" =~ (^|[[:space:]])major($|[[:space:]]) ]]; then
            MA=$((MA+1)); MI=0; PA=0
          elif [[ "$LABELS_LOWER" =~ (^|[[:space:]])minor($|[[:space:]]) ]]; then
            MI=$((MI+1)); PA=0
          elif [[ "$LABELS_LOWER" =~ (^|[[:space:]])patch($|[[:space:]]) ]]; then
            PA=$((PA+1))
          else
            echo "no new version, exiting..."
            exit 0
          fi

          NEW_TAG="$MA.$MI.$PA"
          echo "version=$NEW_TAG" >> $GITHUB_OUTPUT

  build:
    needs: dotnet
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t $IMAGE:${{ github.sha }} .

      - name: Tag images
        run: |
          # always tag SHA
          docker tag $IMAGE:${{ github.sha }} $IMAGE:${{ github.sha }}

          # staging tag
          if [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            docker tag $IMAGE:${{ github.sha }} $IMAGE:staging
          fi

          # main tags
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            docker tag $IMAGE:${{ github.sha }} $IMAGE:latest
          fi

      - name: Login GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: |
          docker push $IMAGE:${{ github.sha }}

          if [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            docker push $IMAGE:staging
          fi

          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            docker push $IMAGE:latest
          fi

  tag:
    needs: version
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' && needs.version.outputs.version != ''
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Git tag
        env:
          VERSION: ${{ needs.version.outputs.version }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists locally."
          else
            git fetch --tags
            if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q "$VERSION"; then
              echo "Tag $VERSION already exists on origin."
              exit 0
            fi
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$VERSION"

          TOKEN="$GH_PAT"
          if [ -z "$TOKEN" ]; then
            TOKEN="$GH_TOKEN"
          fi

          git push "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git" "$VERSION"

  deploy-staging:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'

    steps:
      - uses: actions/checkout@v4
  
      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy staging
        run: |
          kubectl --context=mysticriver-staging -n mr-staging set image deployment/mysticriver-api mysticriver-api=$IMAGE:${{ github.sha }} || true
          kubectl --context=mysticriver-staging -n mr-staging apply -f k8s/base
          kubectl --context=mysticriver-staging -n mr-staging apply -f k8s/staging

  deploy-prod:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy prod
        run: |
          kubectl --context=mysticriver-prod -n mr-prod set image deployment/mysticriver-api mysticriver-api=$IMAGE:${{ github.sha }} || true
          kubectl --context=mysticriver-prod -n mr-prod apply -f k8s/base
          kubectl --context=mysticriver-prod -n mr-prod apply -f k8s/prod
