name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, staging]

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: .NET Restore
        run: dotnet restore MysticRiver.HttpApi/MysticRiver.HttpApi.csproj

      - name: .NET Build
        run: dotnet build MysticRiver.HttpApi/MysticRiver.HttpApi.csproj --configuration Release

      - name: .NET Tests
        run: |
          dotnet test \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory TestResults \
            --blame-hang-timeout 5m \
            --blame-crash

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          retention-days: 7
          path: |
            TestResults/**/*.trx
            TestResults/**/Sequence.xml

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -d "TestResults" ]; then
            echo "Artifacts uploaded (TRX + blame data)." >> $GITHUB_STEP_SUMMARY
          else
            echo "No test results found." >> $GITHUB_STEP_SUMMARY
          fi
